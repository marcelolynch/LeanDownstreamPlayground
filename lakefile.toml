name = "LeanDownstreamPlayground"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanDownstreamPlayground"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "b37d68723f182c065e792f72a11240e182b31cfb"

[[lean_lib]]
name = "LeanDownstreamPlayground"
