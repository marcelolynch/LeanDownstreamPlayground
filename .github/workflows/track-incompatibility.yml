name: Track mathlib incompatibility

# Opens or maintains a single persistent issue describing the current
# mathlib regression affecting this project (if any).  When the snapshot
# clears the first-known-bad commit, the issue is closed automatically
# with a resolution comment.
#
# Runs daily at 20:15 UTC — 15 minutes after the scheduled lkg-bump run,
# by which time the downstream-reports publish-lkg workflow has refreshed
# both lkg/latest.json and runs/latest.json.

on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  incompatibility-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - uses: actions/checkout@v5
    - name: Open or maintain FKB issue
      id: open
      uses: leanprover-community/downstream-reports/.github/actions/open-incompatibility-issue@2026/03/OpenIssue
